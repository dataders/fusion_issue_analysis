name: Fusion Issue Analysis
description: dbt-fusion GitHub issue health from the shared dbt dashboard marts.
connection: fusion

rows:
  - widgets:
      - name: Open Issues
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select open_issues as value from summary_kpis
        column: value
        format: number
      - name: Net Flow
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select closed_4w - opened_4w as value from summary_kpis
        column: value
        format: number
      - name: Median Close
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select rolling_median_close_days as value from summary_kpis
        column: value
        format: number
      - name: 48h Response SLA
        type: metric
        col: 3
        sql: |
          set file_search_path='transform';
          select pct_responded_48h / 100.0 as value from summary_kpis
        column: value
        format: percentage
      - name: Stale Issues
        type: metric
        col: 3
        sql: |
          set file_search_path='transform';
          select stale_count as value from summary_kpis
        column: value
        format: number

  - widgets:
      - name: Cumulative Issue Flow
        type: chart
        chart: line
        col: 12
        sql: |
          set file_search_path='transform';
          select week, cumulative_opened, cumulative_closed
          from cumulative_flow
          order by week
        x: week
        y: [cumulative_opened, cumulative_closed]

  - widgets:
      - name: Median Days to Close
        type: chart
        chart: line
        col: 6
        sql: |
          set file_search_path='transform';
          select
            week,
            max(case when issue_category = 'bug' then median_days end) as bugs,
            max(case when issue_category = 'enhancement' then median_days end) as enhancements
          from velocity
          group by week
          order by week
        x: week
        y: [bugs, enhancements]
      - name: Time to First Response
        type: chart
        chart: line
        col: 6
        sql: |
          set file_search_path='transform';
          select week, p25, p50, p75
          from response_pctiles
          order by week
        x: week
        y: [p25, p50, p75]

  - widgets:
      - name: Open Issue Age by Type
        type: chart
        chart: bar
        stacked: true
        col: 6
        sql: |
          set file_search_path='transform';
          select
            age_bucket,
            sum(case when issue_category = 'bug' then issue_count else 0 end) as bug,
            sum(case when issue_category = 'enhancement' then issue_count else 0 end) as enhancement,
            sum(case when issue_category = 'other' then issue_count else 0 end) as other
          from age_distribution
          group by age_bucket
          order by case age_bucket
            when '0-7d' then 1
            when '8-30d' then 2
            when '31-90d' then 3
            when '91-180d' then 4
            else 5
          end
        x: age_bucket
        y: [bug, enhancement, other]
      - name: Median Days to Close by Label
        type: chart
        chart: bar
        col: 6
        sql: |
          set file_search_path='transform';
          select label_name, median_days_to_close
          from close_by_label
          order by median_days_to_close desc
        x: label_name
        y: [median_days_to_close]

  - widgets:
      - name: Slipped Through
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select slipped_through_count as value from issue_triage_health
        column: value
        format: number
      - name: Triage Queue
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select triage_queue_count as value from issue_triage_health
        column: value
        format: number
      - name: Hard Blockers
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select hard_blocker_count as value from issue_triage_health
        column: value
        format: number
      - name: Needs Repro
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select needs_repro_count as value from issue_triage_health
        column: value
        format: number
      - name: Repro Verified
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select repro_verified_count as value from issue_triage_health
        column: value
        format: number
      - name: Stale (90d+)
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select stale_count as value from issue_triage_health
        column: value
        format: number
      - name: Total Open
        type: metric
        col: 2
        sql: |
          set file_search_path='transform';
          select total_open as value from issue_triage_health
        column: value
        format: number

  - widgets:
      - name: Oldest Untriaged Issues
        type: table
        col: 12
        sql: |
          set file_search_path='transform';
          select issue_number, title, age_days, issue_url
          from oldest_untriaged
          order by age_days desc
          limit 25
        columns:
          - name: issue_number
            label: Issue
            format: number
          - name: title
            label: Title
          - name: age_days
            label: Age Days
            format: number
          - name: issue_url
            label: URL

  - widgets:
      - name: Triage Labeled
        type: metric
        col: 3
        sql: |
          set file_search_path='transform';
          select pct_labeled / 100.0 as value from triage_health
        column: value
        format: percentage
      - name: Triage Typed
        type: metric
        col: 3
        sql: |
          set file_search_path='transform';
          select pct_typed / 100.0 as value from triage_health
        column: value
        format: percentage
      - name: Triage Assigned
        type: metric
        col: 3
        sql: |
          set file_search_path='transform';
          select pct_assigned / 100.0 as value from triage_health
        column: value
        format: percentage
      - name: Triage Milestoned
        type: metric
        col: 3
        sql: |
          set file_search_path='transform';
          select pct_milestoned / 100.0 as value from triage_health
        column: value
        format: percentage

  - widgets:
      - name: Open Issues by Assignee
        type: chart
        chart: bar
        stacked: true
        col: 6
        sql: |
          set file_search_path='transform';
          select assignee_login, bugs, enhancements
          from assignee_workload
          order by open_issues desc
        x: assignee_login
        y: [bugs, enhancements]
      - name: Community Priorities
        type: table
        col: 6
        sql: |
          set file_search_path='transform';
          select issue_number, title, issue_category, reactions_total_count, age_days
          from community_priorities
          order by reactions_total_count desc
        columns:
          - name: issue_number
            label: Issue
            format: number
          - name: title
            label: Title
          - name: issue_category
            label: Type
          - name: reactions_total_count
            label: Reactions
            format: number
          - name: age_days
            label: Age Days
            format: number

