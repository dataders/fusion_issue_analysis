<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dbt-fusion Issue Analysis — Framework Bakeoff</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }

    header {
      flex-shrink: 0;
      padding: 10px 20px 0;
      background: #111;
      border-bottom: 1px solid #333;
    }

    .chrome-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 10px;
      min-width: 0;
    }

    .header-title {
      font-size: 0.78rem;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chrome-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 0 0 auto;
      color: #777;
      font-size: 0.76rem;
      white-space: nowrap;
    }

    .repo-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border: 1px solid #2d2d2d;
      border-radius: 4px;
      background: #1a1a1a;
      opacity: 0.76;
      transition: opacity 0.1s, border-color 0.1s;
    }

    .repo-link:hover,
    .repo-link:focus-visible {
      border-color: #666;
      opacity: 1;
    }

    .repo-link img {
      width: 16px;
      height: 16px;
    }

    nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    nav button,
    .subnav button {
      padding: 7px 18px;
      border: 1px solid transparent;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: inherit;
      transition: color 0.1s;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    nav button {
      border-bottom: none;
      border-radius: 5px 5px 0 0;
      position: relative;
      bottom: -1px;
    }

    .tab-divider {
      display: flex;
      align-items: center;
      padding: 0 6px;
      color: #444;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
      flex: 0 0 auto;
      gap: 5px;
      position: relative;
      bottom: -1px;
    }
    .tab-divider::before {
      content: '';
      display: block;
      width: 1px;
      height: 14px;
      background: #333;
    }

    nav button:hover {
      color: #ccc;
    }

    nav button.active {
      background: #fff;
      color: #111;
      border-color: #333;
      font-weight: 600;
    }

    .subnav {
      display: flex;
      gap: 6px;
      padding: 9px 0 10px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    .subnav[hidden] {
      display: none;
    }

    .subnav button {
      padding: 5px 12px;
      border-color: #333;
      border-radius: 4px;
      background: #1b1b1b;
      font-size: 0.8rem;
    }

    .subnav button:hover {
      color: #ddd;
      border-color: #555;
    }

    .subnav button.active {
      background: #e8e8e8;
      color: #111;
      border-color: #555;
      font-weight: 600;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }

    @media (max-width: 720px) {
      header {
        padding-right: 12px;
        padding-left: 12px;
      }

      .chrome-bar {
        align-items: flex-start;
        flex-direction: column;
        gap: 6px;
      }

      .header-title {
        white-space: normal;
      }

      .chrome-meta {
        font-size: 0.72rem;
      }
    }
  </style>
</head>
<body>
  <!-- Deploy smoke test: keep dashboard/** path change behaviorless. -->
  <header>
    <div class="chrome-bar">
      <p class="header-title">dbt-fusion Issue Analysis — Visualization Framework Bakeoff</p>
      <div class="chrome-meta" aria-label="Dashboard metadata">
        <span id="data-refreshed">Data refreshed: unavailable</span>
        <a
          class="repo-link"
          href="https://github.com/dataders/fusion_issue_analysis"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Open source repository"
          title="Open source repository"
        >
          <img
            src="https://github.githubassets.com/favicons/favicon.svg"
            alt=""
            aria-hidden="true"
          >
        </a>
      </div>
    </div>
    <nav class="main-tabs" aria-label="Dashboard framework">
      <button class="active" data-src="prefab/app.html" data-tab="prefab" onclick="switchTab(this)">Prefab</button>
      <button data-src="ggsql/index.html" data-tab="ggsql" onclick="switchTab(this)">ggsql + Vega-Lite</button>
      <button data-src="mviz/index.html" data-tab="mviz" onclick="switchTab(this)">mviz</button>
      <button data-src="mdv/index.html" data-tab="mdv" onclick="switchTab(this)">MDV</button>
      <button data-src="observable/dist/" data-tab="observable" onclick="switchTab(this)">Observable</button>
      <button data-src="evidence/build/" data-tab="evidence" onclick="switchTab(this)">Evidence.dev</button>
      <button data-src="marimo.html" data-tab="marimo" onclick="switchTab(this)">Marimo</button>
      <button data-src="quarto/index.html" data-tab="quarto" onclick="switchTab(this)">Quarto</button>
      <button data-src="dac/build/" data-tab="dac" onclick="switchTab(this)">DAC</button>
      <button data-src="shaper/index.html" data-tab="shaper" onclick="switchTab(this)">Shaper</button>
      <span class="tab-divider">live</span>
      <button data-src="duckdb-wasm/index.html" data-tab="duckdb-wasm" onclick="switchTab(this)">DuckDB WASM</button>
      <button data-src="mosaic/index.html" data-tab="mosaic" onclick="switchTab(this)">Mosaic</button>
      <button data-src="observable/dist/live.html" data-tab="observable-live" onclick="switchTab(this)">Observable (live)</button>
      <button data-src="about.html" data-tab="about" onclick="switchTab(this)">About</button>
    </nav>
    <div class="subnav" id="prefab-themes" aria-label="Prefab theme">
      <button class="active" data-src="prefab/app.html" data-theme="vanilla" onclick="switchPrefabTheme(this)">Vanilla</button>
      <button data-src="prefab/app_reactive.html" data-theme="reactive" onclick="switchPrefabTheme(this)">Reactive</button>
      <button data-src="prefab/app_myspace.html" data-theme="myspace" onclick="switchPrefabTheme(this)">MySpace</button>
      <button data-src="prefab/app_windows_2000.html" data-theme="windows-2000" onclick="switchPrefabTheme(this)">Windows 2000</button>
    </div>
  </header>
  <iframe id="frame" src="prefab/app.html" title="Dashboard"></iframe>

  <script>
    const tabs = Array.from(document.querySelectorAll('.main-tabs button'));
    const prefabThemes = Array.from(document.querySelectorAll('#prefab-themes button'));
    const prefabThemeBar = document.getElementById('prefab-themes');
    const frame = document.getElementById('frame');
    const dataRefreshed = document.getElementById('data-refreshed');
    const legacyPrefabThemeAliases = {
      "prefab-reactive": "reactive",
      "prefab-myspace": "myspace",
      "prefab-windows-2000": "windows-2000",
    };

    function formatTimestamp(value) {
      if (!value) return null;
      const timestamp = new Date(value);
      if (Number.isNaN(timestamp.getTime())) return null;
      return timestamp.toLocaleString(undefined, {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "numeric",
        minute: "2-digit",
        timeZoneName: "short",
      });
    }

    async function loadDataFreshness() {
      try {
        const response = await fetch("data_freshness.json", { cache: "no-store" });
        if (!response.ok) throw new Error("missing data freshness metadata");
        const metadata = await response.json();
        const latestLoad = formatTimestamp(metadata.latest_load_at);
        if (!latestLoad) throw new Error("invalid data freshness timestamp");

        dataRefreshed.textContent = `Data refreshed: ${latestLoad}`;

        const details = [];
        if (metadata.source) details.push(`Source: ${metadata.source}`);
        if (metadata.issue_rows) details.push(`Issues loaded: ${metadata.issue_rows}`);
        const latestSourceUpdate = formatTimestamp(metadata.latest_source_updated_at);
        if (latestSourceUpdate) details.push(`Latest GitHub update in data: ${latestSourceUpdate}`);
        dataRefreshed.title = details.join("\n");
      } catch {
        dataRefreshed.textContent = "Data refreshed: unavailable";
        dataRefreshed.title = "Run `make data-freshness` to generate dashboard/data_freshness.json.";
      }
    }

    function setActive(buttons, active) {
      buttons.forEach(button => button.classList.toggle('active', button === active));
    }

    function activePrefabTheme() {
      return prefabThemes.find(button => button.classList.contains('active')) || prefabThemes[0];
    }

    function switchTab(btn, options = {}) {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const isPrefab = btn.dataset.tab === "prefab";
      prefabThemeBar.hidden = !isPrefab;

      if (isPrefab) {
        const themeName = options.theme || activePrefabTheme().dataset.theme || "vanilla";
        const theme = prefabThemes.find(button => button.dataset.theme === themeName) || prefabThemes[0];
        setActive(prefabThemes, theme);
        frame.src = theme.dataset.src;
        frame.title = `Prefab ${theme.textContent.trim()}`;
        updateUrl("prefab", theme.dataset.theme);
      } else {
        frame.src = btn.dataset.src;
        frame.title = btn.textContent.trim();
        updateUrl(btn.dataset.tab);
      }
    }

    function switchPrefabTheme(btn) {
      const prefabTab = tabs.find(button => button.dataset.tab === "prefab");
      switchTab(prefabTab, { theme: btn.dataset.theme });
    }

    function updateUrl(tab, theme) {
      const url = new URL(window.location);
      url.searchParams.set("tab", tab);
      if (theme && theme !== "vanilla") {
        url.searchParams.set("theme", theme);
      } else {
        url.searchParams.delete("theme");
      }
      url.hash = tab;
      if (window.location.search !== url.search || window.location.hash !== url.hash) {
        history.replaceState(null, "", url);
      }
    }

    function loadTabFromHash() {
      const params = new URLSearchParams(window.location.search);
      let tab = params.get("tab") || window.location.hash.replace(/^#/, "");
      let theme = params.get("theme");
      if (!tab) return;

      if (legacyPrefabThemeAliases[tab]) {
        theme = legacyPrefabThemeAliases[tab];
        tab = "prefab";
      }
      if (tab === "prefab" && !theme) {
        theme = "vanilla";
      }

      const match = tabs.find(btn => btn.dataset.tab === tab);
      if (match) switchTab(match, { theme });
    }

    loadTabFromHash();
    loadDataFreshness();
    window.addEventListener("popstate", loadTabFromHash);
    window.addEventListener("hashchange", loadTabFromHash);
  </script>
</body>
</html>
