<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>dbt-fusion Issue Analysis — Framework Bakeoff</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }

    header {
      flex-shrink: 0;
      padding: 10px 20px 0;
      background: #111;
      border-bottom: 1px solid #333;
    }

    .header-title {
      font-size: 0.78rem;
      font-weight: 400;
      color: #666;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    nav {
      display: flex;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: thin;
    }

    nav button {
      padding: 7px 18px;
      border: 1px solid transparent;
      border-bottom: none;
      background: transparent;
      color: #888;
      border-radius: 5px 5px 0 0;
      cursor: pointer;
      font-size: 0.875rem;
      font-family: inherit;
      transition: color 0.1s;
      position: relative;
      bottom: -1px;
      flex: 0 0 auto;
      white-space: nowrap;
    }

    nav button:hover {
      color: #ccc;
    }

    nav button.active {
      background: #fff;
      color: #111;
      border-color: #333;
      font-weight: 600;
    }

    iframe {
      flex: 1;
      width: 100%;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <!-- Deploy smoke test: keep dashboard/** path change behaviorless. -->
  <header>
    <p class="header-title">dbt-fusion Issue Analysis — Visualization Framework Bakeoff</p>
    <nav>
      <button class="active" data-src="prefab/app.html" data-tab="prefab" onclick="switchTab(this)">Prefab</button>
      <button data-src="prefab/app_myspace.html" data-tab="prefab-myspace" onclick="switchTab(this)">Prefab MySpace</button>
      <button data-src="ggsql/index.html" data-tab="ggsql" onclick="switchTab(this)">ggsql + Vega-Lite</button>
      <button data-src="mviz/index.html" data-tab="mviz" onclick="switchTab(this)">mviz</button>
      <button data-src="observable/dist/" data-tab="observable" onclick="switchTab(this)">Observable</button>
      <button data-src="evidence/build/" data-tab="evidence" onclick="switchTab(this)">Evidence.dev</button>
      <button data-src="marimo.html" data-tab="marimo" onclick="switchTab(this)">Marimo</button>
      <button data-src="quarto/index.html" data-tab="quarto" onclick="switchTab(this)">Quarto</button>
      <button data-src="about.html" data-tab="about" onclick="switchTab(this)">About</button>
    </nav>
  </header>
  <iframe id="frame" src="prefab/app.html" title="Dashboard"></iframe>

  <script>
    const tabs = Array.from(document.querySelectorAll('nav button'));
    const frame = document.getElementById('frame');

    function switchTab(btn) {
      tabs.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      frame.src = btn.dataset.src;
      frame.title = btn.textContent.trim();

      const url = new URL(window.location);
      url.searchParams.set("tab", btn.dataset.tab);
      url.hash = btn.dataset.tab;
      if (window.location.search !== url.search || window.location.hash !== url.hash) {
        history.replaceState(null, "", url);
      }
    }

    function loadTabFromHash() {
      const params = new URLSearchParams(window.location.search);
      const tab = params.get("tab") || window.location.hash.replace(/^#/, "");
      if (!tab) return;

      const match = tabs.find(btn => btn.dataset.tab === tab);
      if (match) switchTab(match);
    }

    loadTabFromHash();
    window.addEventListener("popstate", loadTabFromHash);
    window.addEventListener("hashchange", loadTabFromHash);
  </script>
</body>
</html>
