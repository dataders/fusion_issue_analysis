name: PR Dashboard Preview

env:
  MDV_SHA: b9d5a8c1bb66b094a8745775cb9bf1389f08403f

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Cache npm packages
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-dashboard-npm-${{ hashFiles('package.json', 'dashboard/observable/package-lock.json', 'dashboard/evidence/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dashboard-npm-

      - name: Cache MDV build
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/fusion-mdv-cache
          key: ${{ runner.os }}-mdv-${{ env.MDV_SHA }}-${{ hashFiles('dashboard/mdv/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-mdv-${{ env.MDV_SHA }}-

      - name: Install dependencies
        run: uv sync --dev

      - name: Install DAC
        run: |
          curl -fsSL https://raw.githubusercontent.com/bruin-data/dac/main/install.sh | bash -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render About page
        run: uv run python3 dashboard/render_about.py

      - name: Build Shaper tab
        run: uv run python3 dashboard/shaper/build.py

      # Data comes from MotherDuck — no extract or dbt build needed.

      - name: Export Prefab dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          mkdir -p preview/prefab
          cp dashboard/index.html preview/index.html
          cp dashboard/about.html preview/about.html
          mkdir -p preview/shaper
          cp dashboard/shaper/index.html preview/shaper/index.html
          cp dashboard/shaper/fusion-issue-health.dashboard.sql preview/shaper/fusion-issue-health.dashboard.sql
          cp dashboard/shaper/shaper.json preview/shaper/shaper.json
          uv run prefab export dashboard/prefab/app.py -o preview/prefab/app.html
          uv run prefab export dashboard/prefab/app_myspace.py -o preview/prefab/app_myspace.html
          uv run prefab export dashboard/prefab/app_windows_2000.py -o preview/prefab/app_windows_2000.html

      - name: Build npm dashboard previews
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_BASE_PATH: /evidence/build
        run: npm run build:npm-dashboards:preview

      - name: Build MDV dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MDV_CACHE_DIR: ${{ runner.temp }}/fusion-mdv-cache/mdv-${{ env.MDV_SHA }}
        run: |
          mkdir -p preview/mdv
          bash dashboard/mdv/build.sh
          cp dashboard/mdv/index.html preview/mdv/index.html

      - name: Build ggsql dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FUSION_DB: md:fusion_issues
        run: |
          mkdir -p preview/ggsql
          uv run dashboard/ggsql/build.py
          cp dashboard/ggsql/index.html preview/ggsql/index.html

      - name: Export Marimo dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: uv run marimo export html --no-include-code dashboard/marimo/app.py -o preview/marimo.html

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python3
        run: |
          mkdir -p preview/quarto
          cd dashboard/quarto
          quarto render index.qmd
          cp index.html ../../preview/quarto/index.html
          cp -r index_files ../../preview/quarto/ 2>/dev/null || true

      - name: Build DAC dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DAC_ENVIRONMENT: prod
          DAC_OUTPUT: preview/dac
        run: |
          uv run python3 dashboard/dac/render.py
          ! grep -q 'bruin query failed' preview/dac/index.html

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-preview
          path: preview/
          retention-days: 7

      - name: Comment preview link on PR
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Dashboard Preview',
              '',
              `Download the preview artifact from [this workflow run](${runUrl}#artifacts) and open \`index.html\`.`,
              '',
              '| Framework | File |',
              '|-----------|------|',
              '| Prefab | `prefab/app.html` |',
              '| Prefab MySpace | `prefab/app_myspace.html` |',
              '| Prefab Windows 2000 | `prefab/app_windows_2000.html` |',
              '| ggsql + Vega-Lite | `ggsql/index.html` |',
              '| mviz | `mviz/index.html` |',
              '| MDV | `mdv/index.html` |',
              '| Observable | `observable/index.html` |',
              '| Evidence.dev | `evidence/index.html` |',
              '| Marimo | `marimo.html` |',
              '| Quarto | `quarto/index.html` |',
              '| DAC | `dac/index.html` |',
              '| Shaper | `shaper/index.html` |',
              '| About | `about.html` |',
              '',
              `_[Workflow run](${runUrl})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Dashboard Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
