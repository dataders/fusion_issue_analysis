name: PR Dashboard Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  pages: write
  id-token: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: cd extract && uv run python run.py

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build dbt models
        run: |
          cd transform
          dbt build --profiles-dir . --static-analysis off

      - name: Export dashboard
        env:
          MOTHERDUCK_TOKEN: ""
        run: |
          # Export all dashboard files
          for f in dashboard/app*.py; do
            name=$(basename "$f" .py)
            uv run prefab export "$f" -o "preview/${name}.html" || true
          done
          # Make app.html the index
          cp preview/app.html preview/index.html 2>/dev/null || true

      - name: Deploy preview to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: preview/

      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
        with:
          preview: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.page_url }}';
            const body = `## 📊 Dashboard Preview

            | Dashboard | Link |
            |-----------|------|
            | Main | [Preview](${previewUrl}) |
            | MySpace Theme | [Preview](${previewUrl}app_myspace.html) |

            _Auto-generated by PR preview workflow_`;

            // Find existing preview comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Dashboard Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
