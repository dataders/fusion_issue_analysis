name: PR Dashboard Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: cd extract && uv run python run.py

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build dbt models
        run: |
          cd transform
          dbt build --profiles-dir . --static-analysis off

      - name: Export dashboards
        env:
          MOTHERDUCK_TOKEN: ""
        run: |
          mkdir -p preview
          for f in dashboard/app*.py; do
            name=$(basename "$f" .py)
            uv run prefab export "$f" -o "preview/${name}.html" --bundled || true
          done
          cp preview/app.html preview/index.html 2>/dev/null || true

      - name: Export ggsql spike
        run: |
          uv run dashboard/ggsql_spike/build.py || true
          cp dashboard/ggsql_spike/index.html preview/ggsql_spike.html 2>/dev/null || true

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-preview
          path: preview/
          retention-days: 7

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const body = [
              '## 📊 Dashboard Preview',
              '',
              `Download the preview artifact from [this workflow run](${artifactUrl}) and open \`index.html\` in your browser.`,
              '',
              '| File | Description |',
              '|------|-------------|',
              '| `index.html` | Main dashboard |',
              '| `app_myspace.html` | MySpace/Xanga theme |',
              '',
              `_Bundled HTML (works offline, ~6MB each). [Workflow run](${runUrl})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Dashboard Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
