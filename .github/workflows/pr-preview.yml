name: PR Dashboard Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: cd extract && uv run python run.py

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build dbt models
        run: |
          cd transform
          dbt build --profiles-dir . --static-analysis baseline

      - name: Export Prefab dashboards
        env:
          MOTHERDUCK_TOKEN: ""
        run: |
          mkdir -p preview/prefab
          cp dashboard/index.html preview/index.html
          for f in dashboard/prefab/app*.py; do
            name=$(basename "$f" .py)
            uv run prefab export "$f" -o "preview/prefab/${name}.html" --bundled || true
          done

      - name: Build ggsql dashboard
        run: |
          mkdir -p preview/ggsql
          uv run dashboard/ggsql/build.py || true
          cp dashboard/ggsql/index.html preview/ggsql/index.html 2>/dev/null || true

      - name: Build mviz dashboard
        run: |
          cd dashboard/mviz
          uv run python generate_data.py
          npx mviz dashboard.md -o ../../preview/mviz.html || true

      - name: Export Marimo dashboard
        run: |
          uv run marimo export html --no-include-code dashboard/marimo/app.py -o preview/marimo.html || true

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-preview
          path: preview/
          retention-days: 7

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = `${runUrl}#artifacts`;
            const body = [
              '## 📊 Dashboard Preview',
              '',
              `Download the preview artifact from [this workflow run](${artifactUrl}) and open \`index.html\` in your browser.`,
              '',
              '| File | Description |',
              '|------|-------------|',
              '| `index.html` | Bakeoff tab wrapper |',
              '| `prefab/app.html` | Prefab health dashboard |',
              '| `prefab/app_myspace.html` | Prefab MySpace edition |',
              '| `ggsql/index.html` | ggsql + Vega-Lite |',
              '| `mviz.html` | mviz |',
              '| `marimo.html` | Marimo |',
              '',
              `_[Workflow run](${runUrl})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Dashboard Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
