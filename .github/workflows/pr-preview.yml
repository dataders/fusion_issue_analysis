name: PR Dashboard Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Render About page
        run: uv run python3 dashboard/render_about.py

      # Data comes from MotherDuck — no extract or dbt build needed.

      - name: Export Prefab dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          mkdir -p preview/prefab
          cp dashboard/index.html preview/index.html
          cp dashboard/about.html preview/about.html
          uv run prefab export dashboard/prefab/app.py -o preview/prefab/app.html
          uv run prefab export dashboard/prefab/app_myspace.py -o preview/prefab/app_myspace.html

      - name: Build mviz dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          mkdir -p preview/mviz
          cd dashboard/mviz
          uv run python generate_data.py
          npx --yes mviz dashboard.md -o ../../preview/mviz/index.html

      - name: Build ggsql dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FUSION_DB: md:fusion_issues
        run: |
          mkdir -p preview/ggsql
          uv run dashboard/ggsql/build.py
          cp dashboard/ggsql/index.html preview/ggsql/index.html

      - name: Export Marimo dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: uv run marimo export html --no-include-code dashboard/marimo/app.py -o preview/marimo.html

      - name: Build Observable Framework dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/observable
          npm ci --silent
          npm run build
          mkdir -p ../preview/observable
          cp -r dist/* ../preview/observable/

      - name: Build Evidence.dev dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_BASE_PATH: /evidence/build
        run: |
          uv run python3 dashboard/evidence/generate_sources.py
          cd dashboard/evidence
          npm ci --legacy-peer-deps --silent
          ./node_modules/.bin/evidence sources
          npm run build
          mkdir -p ../../preview/evidence
          cp -r build/* ../../preview/evidence/

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python3
        run: |
          mkdir -p preview/quarto
          cd dashboard/quarto
          quarto render index.qmd
          cp index.html ../../preview/quarto/index.html
          cp -r index_files ../../preview/quarto/ 2>/dev/null || true

      - name: Upload preview artifact
        uses: actions/upload-artifact@v7
        with:
          name: dashboard-preview
          path: preview/
          retention-days: 7

      - name: Comment preview link on PR
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '## Dashboard Preview',
              '',
              `Download the preview artifact from [this workflow run](${runUrl}#artifacts) and open \`index.html\`.`,
              '',
              '| Framework | File |',
              '|-----------|------|',
              '| Prefab | `prefab/app.html` |',
              '| Prefab MySpace | `prefab/app_myspace.html` |',
              '| ggsql + Vega-Lite | `ggsql/index.html` |',
              '| mviz | `mviz/index.html` |',
              '| Observable | `observable/index.html` |',
              '| Evidence.dev | `evidence/index.html` |',
              '| Marimo | `marimo.html` |',
              '| Quarto | `quarto/index.html` |',
              '| About | `about.html` |',
              '',
              `_[Workflow run](${runUrl})_`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Dashboard Preview')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
