name: Extract GitHub Issues

on:
  schedule:
    # Run every 6 hours (4x per day) at :00 UTC
    - cron: '0 */6 * * *'
  push:
    branches: [main]
    paths:
      - 'extract/**'
      - 'transform/**'
      - '.github/workflows/extract.yml'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract issues to MotherDuck
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: cd extract && uv run python run.py --motherduck

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Refresh dbt models in MotherDuck
        # TODO: Remove timeout + continue-on-error once dbt-labs/dbt-fusion#1574 is fixed
        timeout-minutes: 5
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd transform
          dbt build --profiles-dir . --target prod --static-analysis strict
