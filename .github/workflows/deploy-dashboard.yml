name: Deploy Dashboard to GitHub Pages

on:
  # Re-deploy when dashboard code changes on main
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  # Run daily at 6am UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger (e.g., after refreshing data)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: cd extract && uv run python run.py

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build dbt models (local DuckDB)
        run: |
          cd transform
          dbt build --profiles-dir . --static-analysis baseline

      - name: Build dbt models (MotherDuck prod)
        # TODO: Remove timeout + || true once dbt-labs/dbt-fusion#1574 is fixed
        # Fusion hangs or crashes (SIGFPE) on Linux when connecting to MotherDuck
        timeout-minutes: 5
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd transform
          dbt build --profiles-dir . --target prod --static-analysis strict

      - name: Export Prefab dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          for f in dashboard/prefab/app*.py; do
            name=$(basename "$f" .py)
            uv run prefab export "$f" -o "dashboard/prefab/${name}.html" || true
          done

      - name: Build mviz dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/mviz
          uv run python generate_data.py
          npx mviz dashboard.md -o index.html

      - name: Build ggsql dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FUSION_DB: md:fusion_issues
        run: uv run dashboard/ggsql/build.py

      - name: Build Observable Framework dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/observable
          npm ci
          npm run build

      - name: Configure Evidence.dev
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_BASE_PATH: /fusion_issue_analysis/evidence/build
        run: uv run python3 dashboard/evidence/generate_sources.py

      - name: Build Evidence.dev dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/evidence
          npm ci --legacy-peer-deps
          ./node_modules/.bin/evidence sources
          npm run build

      - name: Export Marimo dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: uv run marimo export html --no-include-code dashboard/marimo/app.py -o dashboard/marimo.html

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python3
        run: |
          cd dashboard/quarto
          quarto render index.qmd

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
