name: Deploy Dashboard to GitHub Pages

env:
  MDV_SHA: b9d5a8c1bb66b094a8745775cb9bf1389f08403f

on:
  # Re-deploy when dashboard code changes on main
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'package.json'
      - '.github/workflows/deploy-dashboard.yml'
  # Run daily at 6am UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger (e.g., after refreshing data)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Cache npm packages
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-dashboard-npm-${{ hashFiles('package.json', 'dashboard/observable/package-lock.json', 'dashboard/evidence/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-dashboard-npm-

      - name: Cache MDV build
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/fusion-mdv-cache
          key: ${{ runner.os }}-mdv-${{ env.MDV_SHA }}-${{ hashFiles('dashboard/mdv/build.sh') }}
          restore-keys: |
            ${{ runner.os }}-mdv-${{ env.MDV_SHA }}-

      - name: Install dependencies
        run: uv sync

      - name: Install DAC
        run: |
          curl -fsSL https://raw.githubusercontent.com/bruin-data/dac/main/install.sh | bash -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render About page
        run: uv run python3 dashboard/render_about.py

      - name: Build Shaper tab
        run: uv run python3 dashboard/shaper/build.py

      - name: Export Prefab dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          for f in dashboard/prefab/app*.py; do
            name=$(basename "$f" .py)
            uv run prefab export "$f" -o "dashboard/prefab/${name}.html" || true
          done

      - name: Build npm dashboards
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_BASE_PATH: /evidence/build
        run: npm run build:npm-dashboards

      - name: Build MDV dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          MDV_CACHE_DIR: ${{ runner.temp }}/fusion-mdv-cache/mdv-${{ env.MDV_SHA }}
        run: bash dashboard/mdv/build.sh

      - name: Build ggsql dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FUSION_DB: md:fusion_issues
        run: uv run dashboard/ggsql/build.py

      - name: Export Marimo dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: uv run marimo export html --no-include-code dashboard/marimo/app.py -o dashboard/marimo.html

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render Quarto dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python3
        run: |
          cd dashboard/quarto
          quarto render index.qmd

      - name: Build DAC dashboard
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DAC_ENVIRONMENT: prod
          DAC_OUTPUT: dashboard/dac/build
        run: |
          uv run python3 dashboard/dac/render.py
          ! grep -q 'bruin query failed' dashboard/dac/build/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dashboard/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
