name: Deploy Dashboard to GitHub Pages

on:
  # Re-deploy when dashboard code changes on main
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - '.github/workflows/deploy-dashboard.yml'
  # Run daily at 6am UTC
  schedule:
    - cron: '0 6 * * *'
  # Allow manual trigger (e.g., after refreshing data)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        run: uv sync

      - name: Extract GitHub issues
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: cd extract && uv run python run.py

      - name: Install dbt Fusion
        run: |
          curl -fsSL https://public.cdn.getdbt.com/fs/install/install.sh | sh -s -- --update
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build dbt models (local DuckDB)
        run: |
          cd transform
          dbt build --profiles-dir . --static-analysis off

      - name: Build dbt models (MotherDuck prod)
        # TODO: Remove timeout + || true once dbt-labs/dbt-fusion#1574 is fixed
        # Fusion hangs or crashes (SIGFPE) on Linux when connecting to MotherDuck
        timeout-minutes: 5
        continue-on-error: true
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd transform
          dbt build --profiles-dir . --target prod --static-analysis off

      - name: Export Prefab dashboards
        env:
          MOTHERDUCK_TOKEN: ""
        run: |
          for f in dashboard/app*.py; do
            name=$(basename "$f" .py)
            uv run prefab export "$f" -o "dashboard/${name}.html" || true
          done

      - name: Build mviz dashboard
        run: |
          cd dashboard
          uv run python generate_data.py
          npx mviz mviz_dashboard.md -o mviz.html

      - name: Build ggsql spike dashboard
        run: uv run dashboard/ggsql_spike/build.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
