name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      # ── Dashboard smoke-test (all frameworks, no || true) ─────────────────
      # Data comes from MotherDuck — extract.yml keeps it fresh 4x/day.
      # No extract or dbt build here; those run in extract.yml on schedule
      # and on push to extract/** or transform/**.

      - name: Smoke-test Prefab
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          uv run prefab export dashboard/prefab/app.py -o /tmp/prefab_app.html
          uv run prefab export dashboard/prefab/app_myspace.py -o /tmp/prefab_myspace.html

      - name: Smoke-test mviz
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/mviz
          uv run python generate_data.py
          npx --yes mviz dashboard.md -o /tmp/mviz.html

      - name: Smoke-test ggsql
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FUSION_DB: md:fusion_issues
        run: uv run dashboard/ggsql/build.py

      - name: Smoke-test Marimo
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: uv run marimo export html --no-include-code dashboard/marimo/app.py -o /tmp/marimo.html

      - name: Smoke-test Observable
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/observable
          npm ci --silent
          npm run build

      - name: Smoke-test Evidence
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_BASE_PATH: /fusion_issue_analysis/evidence/build
        run: |
          uv run python3 dashboard/evidence/generate_sources.py
          cd dashboard/evidence
          npm ci --legacy-peer-deps --silent
          ./node_modules/.bin/evidence sources
          npm run build

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Smoke-test Quarto
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python3
        run: |
          cd dashboard/quarto
          quarto render index.qmd
