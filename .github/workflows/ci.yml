name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --dev

      - name: Install DAC
        run: |
          curl -fsSL https://raw.githubusercontent.com/bruin-data/dac/main/install.sh | bash -s -- -b "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render About page
        run: uv run python3 dashboard/render_about.py

      - name: Build Shaper tab
        run: uv run python3 dashboard/shaper/build.py

      # ── Dashboard smoke-test (all frameworks, no || true) ─────────────────
      # Data comes from MotherDuck — extract.yml keeps it fresh 4x/day.
      # No extract or dbt build here; those run in extract.yml on schedule
      # and on push to extract/** or transform/**.

      - name: Smoke-test Prefab
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          uv run prefab export dashboard/prefab/app.py -o /tmp/prefab_app.html
          uv run prefab export dashboard/prefab/app_myspace.py -o /tmp/prefab_myspace.html
          uv run prefab export dashboard/prefab/app_windows_2000.py -o /tmp/prefab_windows_2000.html

      - name: Smoke-test mviz
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/mviz
          uv run python generate_data.py
          npx --yes mviz@1.6.7 dashboard.md -o /tmp/mviz.html

      - name: Smoke-test ggsql
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          FUSION_DB: md:fusion_issues
        run: uv run dashboard/ggsql/build.py

      - name: Smoke-test Marimo
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: uv run marimo export html --no-include-code dashboard/marimo/app.py -o /tmp/marimo.html

      - name: Smoke-test Observable
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
        run: |
          cd dashboard/observable
          npm ci --silent
          npm run build

      - name: Smoke-test Evidence
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          EVIDENCE_BASE_PATH: /evidence/build
        run: |
          uv run python3 dashboard/evidence/generate_sources.py
          cd dashboard/evidence
          npm ci --legacy-peer-deps --silent
          ./node_modules/.bin/evidence sources
          npm run build

      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Smoke-test Quarto
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          QUARTO_PYTHON: ${{ github.workspace }}/.venv/bin/python3
        run: |
          cd dashboard/quarto
          quarto render index.qmd

      - name: Smoke-test DAC
        env:
          MOTHERDUCK_TOKEN: ${{ secrets.MOTHERDUCK_TOKEN }}
          DAC_ENVIRONMENT: prod
          DAC_OUTPUT: /tmp/dac-build
        run: |
          uv run python3 dashboard/dac/render.py
          ! grep -q 'bruin query failed' /tmp/dac-build/index.html
